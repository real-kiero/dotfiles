# Set the default terminal type with 256 color support
set -g default-terminal "tmux-256color"

# Enable true color (24-bit) support - multiple methods for compatibility
set -sa terminal-overrides ",xterm*:Tc"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:RGB"
set -ga terminal-overrides ",*:RGB"

# Enable undercurl support (for better text decorations)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Focus events enabled for terminals that support them
set -g focus-events on

# Basic configs
unbind r
bind r source-file ~/.tmux.conf

# start indexing at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# nice defaults
set-option -g status-position top
set -g prefix C-s

# plugin manager
set -g @plugin 'tmux-plugins/tpm'

# open panes in current directory (ideal for splits)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Terafox colorscheme
# Based on https://github.com/EdenEast/nightfox.nvim

# Terafox colors
bg0="#152528"
bg1="#1d3337"
bg2="#254147"
fg0="#e6eaea"
fg1="#cbd9d8"
sel0="#2f4b52"
sel1="#3d5a62"
comment="#587b7b"
cyan="#7fdbca"
green="#b3f5b8"
orange="#ffc599"
pink="#fdb292"
purple="#a48add"
red="#e85c51"
yellow="#fdb292"

# Status bar configuration
set -g status-style "bg=$bg0,fg=$fg1"
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify left

# Left status with session name
set -g status-left "#[bg=$cyan,fg=$bg0,bold] #S #[bg=$bg0,fg=$cyan]"

# Right status with date/time
set -g status-right "#[bg=$bg0,fg=$sel1]#[bg=$sel1,fg=$fg0] %Y-%m-%d #[bg=$sel1,fg=$cyan]#[bg=$cyan,fg=$bg0,bold] %H:%M "

# Window status format (inactive windows)
set -g window-status-format "#[bg=$bg0,fg=$bg1]#[bg=$bg1,fg=$comment] #I #W #[bg=$bg0,fg=$bg1]"

# Window status format (active window)
set -g window-status-current-format "#[bg=$bg0,fg=$sel0]#[bg=$sel0,fg=$cyan,bold] #I #W #[bg=$bg0,fg=$sel0]"

# Window status activity
set -g window-status-activity-style "bg=$bg1,fg=$orange"

# Pane borders
set -g pane-border-style "fg=$sel0"
set -g pane-active-border-style "fg=$cyan"

# Message text
set -g message-style "bg=$sel1,fg=$fg0"
set -g message-command-style "bg=$sel1,fg=$fg0"

# Clock
set -g clock-mode-colour "$cyan"

# Initialize tmux plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
